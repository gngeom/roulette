<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>페이지를 찾을 수 없습니다</title>
	<style>
		* { box-sizing: border-box; margin: 0; padding: 0; }
		body {
			font-family: "Noto Sans KR", system-ui, sans-serif;
			min-height: 100vh;
			display: flex;
			align-items: center;
			justify-content: center;
			background: #e8f0f6;
			color: #1a2d3d;
			padding: 24px;
		}
		.card {
			max-width: 420px;
			background: #fff;
			border-radius: 16px;
			padding: 32px 28px;
			box-shadow: 0 8px 32px rgba(0, 60, 120, 0.12);
			text-align: center;
		}
		h1 { font-size: 1.25rem; margin-bottom: 12px; }
		p { font-size: 0.95rem; line-height: 1.6; color: #455a64; }
	</style>
</head>
<body>
	<div class="card">
		<h1>페이지를 찾을 수 없습니다</h1>
		<p>요청하신 주소에 해당하는 콘텐츠가 없거나, 이용이 제한된 상태입니다.</p>
	</div>
</body>
</html>
